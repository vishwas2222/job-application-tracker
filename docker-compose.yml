version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - SECRET_KEY=supersecretkey
    volumes:
      - ./backend/data.json:/app/data.json

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE=http://localhost:5000/api
